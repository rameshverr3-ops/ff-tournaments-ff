<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transaction History</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f4f9;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 500px;
            margin: auto;
            background: white;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        h1 {
            text-align: center;
            color: #333;
            font-size: 22px;
            margin-bottom: 20px;
            border-bottom: 2px solid #eee;
            padding-bottom: 10px;
        }
        .date-section {
            margin-top: 20px;
            font-weight: bold;
            color: #666;
            font-size: 14px;
            background: #f9f9f9;
            padding: 5px 10px;
            border-left: 4px solid #333;
        }
        .transaction {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 0;
            border-bottom: 1px solid #f0f0f0;
        }
        .details {
            display: flex;
            flex-direction: column;
        }
        .type {
            font-size: 16px;
            font-weight: bold;
        }
        .sub-text {
            font-size: 12px;
            color: #888;
            margin-top: 3px;
        }
        .amount {
            font-size: 18px;
            font-weight: bold;
        }
        .credit { color: black; }
        .spend { color: #e74c3c; } /* Red */
        .win { color: #2ecc71; } /* Green */
    </style>
</head>
<body>

<div class="container">
    <h1>Your History</h1>

    <div class="date-section">15-04-2026</div>
    
    <div class="transaction">
        <div class="details">
            <span class="type credit">CREDIT</span>
            <span class="sub-text">TXN ID: 849201745231</span>
        </div>
        <div class="amount credit">₹300.00</div>
    </div>

    <div class="transaction">
        <div class="details">
            <span class="type spend">SPEND</span>
            <span class="sub-text">TXN ID: 637485920112</span>
        </div>
        <div class="amount spend">- ₹120.00</div>
    </div>

    <div class="transaction">
        <div class="details">
            <span class="type win">WIN</span>
            <span class="sub-text">Survive Time: 7m 09s</span>
        </div>
        <div class="amount win">+ ₹643.50</div>
    </div>

</div>

</body>
</html>
