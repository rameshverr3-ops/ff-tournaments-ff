<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment Page</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            background-color: #f4f4f4;
        }

        /* Top Buttons Container */
        .top-nav {
            display: flex;
            justify-content: space-between;
            margin-bottom: 30px;
        }

        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 5px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            font-size: 16px;
        }

        .add-pay-btn { background-color: #28a745; } /* Green */
        .withdraw-btn { background-color: #ff8c00; } /* Orange */

        /* Payment Options Box */
        #payment-box {
            display: none; /* Shuruat me hidden rahega */
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            max-width: 400px;
            margin: 0 auto;
            text-align: center;
        }

        .options-container {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin: 20px 0;
            text-align: left;
        }

        .option-item {
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
            cursor: pointer;
        }

        .option-item input { margin-right: 10px; }

        .submit-pay-btn {
            background-color: #28a745;
            width: 100%;
            margin-top: 10px;
        }
    </style>
</head>
<body>

    <div class="top-nav">
        <button class="btn add-pay-btn" onclick="showPaymentOptions()">Add Payment</button>
        <button class="btn withdraw-btn">Withdrawal</button>
    </div>

    <div id="payment-box">
        <h3>Select Amount</h3>
        <div class="options-container">
            <label class="option-item">
                <input type="radio" name="amount" value="300"> Rs 300
            </label>
            <label class="option-item">
                <input type="radio" name="amount" value="500"> Rs 500
            </label>
            <label class="option-item">
                <input type="radio" name="amount" value="800"> Rs 800
            </label>
            <label class="option-item">
                <input type="radio" name="amount" value="1000"> Rs 1000
            </label>
        </div>
        <button class="btn submit-pay-btn" onclick="redirectToPayment()">Add Payment</button>
    </div>

    <script>
        // Box dikhane ke liye function
        function showPaymentOptions() {
            document.getElementById('payment-box').style.display = 'block';
        }

        // Sahi link par redirect karne ke liye function
        function redirectToPayment() {
            const selectedAmount = document.querySelector('input[name="amount"]:checked');
            
            if (!selectedAmount) {
                alert("Kripya ek amount select karein!");
                return;
            }

            const amount = selectedAmount.value;

            // Yahan aap apni links change kar sakte hain
            const links = {
                "300": "https://drive.google.com/file/d/10BEJhRtB0cR3wcMGfUI9T2jWZyYDyrRn/view",
                "500": "https://drive.google.com/file/d/10BEJhRtB0cR3wcMGfUI9T2jWZyYDyrRn/view",
                "800": "https://drive.google.com/file/d/10BEJhRtB0cR3wcMGfUI9T2jWZyYDyrRn/view",
                "1000": "https://drive.google.com/file/d/10BEJhRtB0cR3wcMGfUI9T2jWZyYDyrRn/view"
            };

            // Naye tab me link khulegi
            window.open(links[amount], "_blank");
        }
    </script>

</body>
</html>
